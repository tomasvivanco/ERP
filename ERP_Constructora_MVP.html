<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
<title>ERP Constructora Chile v3</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── RESET & ROOT ─────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
:root{--navy:#1e3a5f;--navyD:#152b47;--orange:#e67e22;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--yellow:#d97706;--border:#e2e8f0;--muted:#64748b;--light:#f8fafc;--card:#fff;--radius:12px}
a{text-decoration:none}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* ── LAYOUT ─────────────────────────────────────────────*/
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .2s}
#main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{height:54px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:50;flex-shrink:0}
#content{flex:1;padding:22px}

/* ── SIDEBAR ─────────────────────────────────────────── */
.sb-logo{padding:16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10;cursor:default}
.sb-icon{font-size:26px;flex-shrink:0}
.sb-name{font-size:12px;font-weight:700;color:#fff;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
nav{flex:1;padding:6px 0;overflow-y:auto}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 16px;background:none;border:none;border-right:3px solid transparent;cursor:pointer;color:rgba(255,255,255,.6);font-size:13px;font-weight:500;text-align:left;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-btn.active{background:rgba(255,255,255,.14);color:#fff;font-weight:700;border-right-color:var(--orange)}
.nav-ic{font-size:16px;flex-shrink:0}
.sb-user{padding:12px;border-top:1px solid rgba(255,255,255,.1)}
.sb-user-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sb-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.sb-uname{font-size:12px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-urole{font-size:10px;color:rgba(255,255,255,.4)}
.btn-logout{width:100%;padding:6px;background:none;border:1px solid rgba(255,255,255,.2);border-radius:7px;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;transition:all .15s}
.btn-logout:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── TOPBAR ──────────────────────────────────────────── */
#tb-title{flex:1;font-weight:700;font-size:17px}
#search-wrap{position:relative}
#search-input{border:1px solid var(--border);border-radius:24px;padding:6px 14px 6px 34px;font-size:13px;width:220px;transition:all .2s;background:var(--light)}
#search-input:focus{outline:none;border-color:var(--blue);width:280px;background:#fff}
.search-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
#search-results{position:absolute;top:38px;left:0;width:320px;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;display:none;max-height:320px;overflow-y:auto}
.sr-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f1f5f9}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:#f8fafc}
.sr-tag{font-size:10px;background:#eff6ff;color:var(--blue);padding:2px 6px;border-radius:4px;font-weight:600}
#tb-notif{position:relative;cursor:pointer;font-size:20px;flex-shrink:0;display:none}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
#tb-session{font-size:11px;color:var(--muted);flex-shrink:0}

/* ── BUTTONS ────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-md{padding:8px 16px;font-size:13px}
.btn-lg{padding:10px 20px;font-size:15px}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover:not(:disabled){background:var(--navyD)}
.btn-accent{background:var(--orange);color:#fff}.btn-accent:hover:not(:disabled){background:#cf6d17}
.btn-success{background:var(--green);color:#fff}.btn-success:hover:not(:disabled){background:#15803d}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover:not(:disabled){background:#b91c1c}
.btn-ghost{background:#fff;color:#374151;border:1px solid var(--border)}.btn-ghost:hover:not(:disabled){background:var(--light)}
.btn-full{width:100%;justify-content:center}

/* ── FORM FIELDS ────────────────────────────────────── */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.field label .req{color:var(--red);margin-left:3px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:#1e293b;background:#fff;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.12)}
.field input[readonly]{background:var(--light)}
.field input.error,.field select.error{border-color:var(--red)}
.field-hint{font-size:11px;color:var(--muted);margin-top:2px}
.field-err{font-size:11px;color:var(--red);margin-top:2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* ── CARDS ──────────────────────────────────────────── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-weight:700;font-size:15px}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px}
.card-body{padding:20px}

/* ── KPI ─────────────────────────────────────────────── */
.kpi-grid{display:grid;gap:14px;margin-bottom:18px}
.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
.kpi{background:#fff;border-radius:var(--radius);border-left:4px solid var(--blue);padding:14px 16px;display:flex;gap:14px;align-items:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.kpi.green{border-left-color:var(--green)}.kpi.orange{border-left-color:var(--orange)}.kpi.red{border-left-color:var(--red)}.kpi.purple{border-left-color:#7c3aed}.kpi.yellow{border-left-color:var(--yellow)}
.kpi-ic{font-size:22px;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#eff6ff}
.kpi.green .kpi-ic{background:#f0fdf4}.kpi.orange .kpi-ic{background:#fff7ed}.kpi.red .kpi-ic{background:#fef2f2}.kpi.purple .kpi-ic{background:#f5f3ff}.kpi.yellow .kpi-ic{background:#fefce8}
.kpi-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.kpi-val{font-size:20px;font-weight:700;color:var(--blue);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kpi.green .kpi-val{color:var(--green)}.kpi.orange .kpi-val{color:var(--orange)}.kpi.red .kpi-val{color:var(--red)}.kpi.purple .kpi-val{color:#7c3aed}.kpi.yellow .kpi-val{color:var(--yellow)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── TABLE ───────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:#f8fafc;border-bottom:2px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;white-space:nowrap}
th.r,td.r{text-align:right}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;white-space:nowrap}
tbody tr:hover{background:#f8fafc;cursor:default}
.empty-td{text-align:center!important;padding:40px!important;color:var(--muted)!important;font-size:14px!important}

/* ── BADGE ───────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bg-blue{background:#dbeafe;color:#1d4ed8}.bg-green{background:#dcfce7;color:#15803d}
.bg-yellow{background:#fef9c3;color:#a16207}.bg-red{background:#fee2e2;color:#b91c1c}
.bg-gray{background:#f1f5f9;color:#475569}.bg-orange{background:#ffedd5;color:#c2410c}
.bg-purple{background:#ede9fe;color:#6d28d9}

/* ── PROGRESS ────────────────────────────────────────── */
.pbar{display:flex;align-items:center;gap:8px}
.pbar-track{flex:1;background:#e2e8f0;border-radius:4px;height:7px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s}
.pbar-lbl{font-size:12px;font-weight:600;color:var(--muted);width:32px;text-align:right;flex-shrink:0}

/* ── MODAL ───────────────────────────────────────────── */
.m-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.m-box{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-height:90vh;display:flex;flex-direction:column;animation:mup .2s ease}
.m-sm{max-width:480px}.m-md{max-width:620px}.m-lg{max-width:820px}.m-xl{max-width:1000px}
.m-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.m-head h2{font-size:17px;font-weight:700}
.m-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:2px 6px;border-radius:6px}
.m-close:hover{background:var(--light);color:#1e293b}
.m-body{overflow-y:auto;padding:24px;flex:1}
.m-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}

/* ── ALERTS ─────────────────────────────────────────── */
.alert{border-radius:8px;padding:10px 14px;font-size:12px;display:flex;gap:8px;align-items:flex-start;margin-bottom:12px}
.a-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8}
.a-success{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.a-warn{background:#fefce8;border:1px solid #fde68a;color:#92400e}
.a-danger{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}

/* ── TOAST ───────────────────────────────────────────── */
#toast-root{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1e293b;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;min-width:240px;max-width:340px;box-shadow:0 8px 24px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px;animation:mup .25s ease;border-left:4px solid #fff;pointer-events:auto}
.toast.ok{border-left-color:#16a34a}.toast.err{border-left-color:#dc2626}.toast.warn{border-left-color:#d97706}.toast.info{border-left-color:#2563eb}

/* ── TABS ────────────────────────────────────────────── */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:9px 18px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.on{color:var(--navy);border-bottom-color:var(--navy)}
.tab:hover:not(.on){color:#374151}

/* ── MISC ────────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:16px 0}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#f1f5f9;color:#475569;border:1px solid var(--border)}
.mono{font-family:'Courier New',monospace}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.chart-box{position:relative;height:240px}

/* ── LOGIN ───────────────────────────────────────────── */
#login{min-height:100vh;background:linear-gradient(135deg,#0f2440,#1e3a5f);display:flex;align-items:center;justify-content:center;padding:16px;display:none}
.login-box{background:#fff;border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.3);padding:40px;width:100%;max-width:420px}
.login-logo{text-align:center;margin-bottom:28px}
.login-ic{font-size:52px;margin-bottom:8px}
.login-h{font-size:24px;font-weight:800;color:#1e293b}
.login-sub{font-size:13px;color:var(--muted);margin-top:4px}
.demo-users{display:flex;flex-direction:column;gap:6px}
.demo-u{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;background:var(--light);cursor:pointer;border:1px solid var(--border);transition:background .15s}
.demo-u:hover{background:#e0f2fe}
.demo-email{font-size:12px;font-weight:600}

/* ── PRINT STYLES ────────────────────────────────────── */
@media print{
  #sidebar,#topbar,#modal-root,#toast-root,.no-print{display:none!important}
  #main{margin-left:0!important}
  #content{padding:0!important}
  body{background:#fff}
  .print-only{display:block!important}
  .card{box-shadow:none!important;border:1px solid #ddd!important}
  table{font-size:11px}
  @page{margin:15mm;size:A4}
}
.print-only{display:none}

/* ── ANIMATIONS ──────────────────────────────────────── */
@keyframes mup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:mup .2s ease}
.spinning{animation:spin 1.2s linear infinite;display:inline-block}

/* ── LIQUIDACION PRINT ───────────────────────────────── */
.liq-print{font-family:Arial,sans-serif;font-size:12px;color:#1e293b;padding:20px}
.liq-header{display:flex;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #1e3a5f}
.liq-title{font-size:18px;font-weight:700;color:#1e3a5f}
.liq-section{margin-bottom:14px}
.liq-section-title{font-weight:700;background:#1e3a5f;color:#fff;padding:4px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.liq-row{display:flex;justify-content:space-between;padding:4px 10px;font-size:12px}
.liq-row:nth-child(even){background:#f8fafc}
.liq-total{display:flex;justify-content:space-between;padding:8px 10px;font-weight:700;font-size:14px;background:#1e3a5f;color:#fff;margin-top:8px;border-radius:4px}

/* ── CONCILIACION ────────────────────────────────────── */
.bank-card{border:2px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.bank-card.selected{border-color:var(--blue);background:#eff6ff}
.bank-card:hover:not(.selected){border-color:#93c5fd}
.match-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--light);border:1px solid var(--border);margin-bottom:6px}
.match-item.matched{background:#f0fdf4;border-color:#bbf7d0}
.match-item.unmatched{background:#fef2f2;border-color:#fecaca}
</style>
</head>
<body>

<div id="login">
  <div class="login-box fade">
    <div class="login-logo">
      <div class="login-ic">🏗️</div>
      <div class="login-h">ERP Constructora</div>
      <div class="login-sub" id="co-name-login">Chile</div>
    </div>
    <div class="field"><label>Email<span class="req">*</span></label><input type="email" id="l-email" placeholder="usuario@empresa.cl" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="field"><label>Contraseña<span class="req">*</span></label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div id="l-err" class="alert a-danger" style="display:none"></div>
    <button class="btn btn-primary btn-lg btn-full" onclick="doLogin()" style="margin-top:4px">🔑 Ingresar al sistema</button>
    <div class="divider"></div>
    <div style="font-size:12px;color:var(--muted);font-weight:600;text-align:center;margin-bottom:8px">Acceso rápido (demo)</div>
    <div class="demo-users" id="demo-list"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sb-logo">
      <div class="sb-icon">🏗️</div>
      <div style="min-width:0">
        <div class="sb-name" id="sb-co"></div>
        <div class="sb-sub">ERP Constructora Chile v3</div>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="sb-user">
      <div class="sb-user-row">
        <div class="sb-av" id="sb-av"></div>
        <div style="min-width:0">
          <div class="sb-uname" id="sb-uname"></div>
          <div class="sb-urole" id="sb-urole"></div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">🚪 Cerrar sesión</button>
    </div>
  </div>
  <div id="main">
    <div id="topbar">
      <div id="tb-title">Dashboard</div>
      <div id="search-wrap">
        <span class="search-ic">🔍</span>
        <input type="text" id="search-input" placeholder="Buscar proyectos, proveedores, OC..." oninput="doSearch(this.value)" onfocus="showSearch()" onblur="setTimeout(hideSearch,200)">
        <div id="search-results"></div>
      </div>
      <div id="tb-notif" onclick="showPendingAlert()">🔔<div class="notif-badge" id="notif-count">0</div></div>
      <div id="tb-session"></div>
    </div>
    <div id="content" class="fade"></div>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════
// AFP RATES (Superintendencia de Pensiones, vigente oct 2025)
// ═══════════════════════════════════════════════════════
const AFP_RATES = {
  'Capital':  {com:1.44}, 'Cuprum':   {com:1.44},
  'Habitat':  {com:1.27}, 'Modelo':   {com:0.58},
  'Planvital':{com:1.16}, 'ProVida':  {com:1.45},
  'Uno':      {com:0.46}
};

// ── APU PRECIOS BASE (MINVU RM 2025, UF=$38,377) ──────
const APU_TPL = [
  {chapter:'OBRAS PRELIMINARES',items:[
    {code:'1.1',desc:'Limpieza/despeje terreno c/máquina',unit:'m²',upMO:2800,upMAT:500,upSC:0,upEQ:9200},
    {code:'1.2',desc:'Trazado y replanteo',unit:'m',upMO:6200,upMAT:1500,upSC:0,upEQ:800},
    {code:'1.3',desc:'Excavación fundaciones c/máquina',unit:'m³',upMO:2500,upMAT:0,upSC:0,upEQ:8800},
    {code:'1.4',desc:'Excavación manual',unit:'m³',upMO:18500,upMAT:0,upSC:0,upEQ:1200},
    {code:'1.5',desc:'Relleno compactado c/material',unit:'m³',upMO:9200,upMAT:2800,upSC:0,upEQ:4200},
    {code:'1.6',desc:'Retiro de escombros a botadero',unit:'m³',upMO:4200,upMAT:0,upSC:0,upEQ:9800},
  ]},
  {chapter:'HORMIGÓN ARMADO',items:[
    {code:'2.1',desc:'Hormigón H-25 (G15) cimientos',unit:'m³',upMO:38000,upMAT:128000,upSC:0,upEQ:8500},

// Validate RUT Chile
function validRut(rut){
  if(!rut)return false;
  const r=rut.replace(/[.\s]/g,'').toUpperCase();
  if(!/^\d{7,8}-[\dK]$/.test(r))return false;
  const [num,dv]=r.split('-');
  let s=0,m=2,rev=[...num].reverse();
  rev.forEach(d=>{s+=Number(d)*m;m=m<7?m+1:2;});
  const calc=11-(s%11);
  const expected=calc===11?'0':calc===10?'K':String(calc);
  return dv===expected;
}

// ═══════════════════════════════════════════════════════
// SALARY CALCULATOR (Normativa Chile 2025)
// ═══════════════════════════════════════════════════════
function calcLiquidacion(worker, periodo){
  const imponible = Math.min(worker.salary, TOPE_IMPONIBLE);
  const afpRate = AFP_RATES[worker.afp];
  const comisionAFP = afpRate ? afpRate.com : 1.44;

  // Descuentos legales a cargo del trabajador
  const dAFP = Math.round(imponible * COTI.AFP_BASE / 100);
  const dComAFP = Math.round(imponible * comisionAFP / 100);
  const dSalud = Math.round(imponible * (worker.saludPct || 7) / 100);
  const dCesantia = worker.contract === 'INDEF' ? Math.round(imponible * COTI.CESANTIA_W / 100) : 0;
  const totalDesc = dAFP + dComAFP + dSalud + dCesantia;
  const liquido = worker.salary - totalDesc;

  // Cargo empleador (informativo, no afecta líquido)
  const cSIS = Math.round(imponible * COTI.SIS / 100);
  const cCes = Math.round(imponible * (worker.contract==='INDEF'?COTI.CESANTIA_E_INDEF:COTI.CESANTIA_E_FIJO) / 100);
  const cMutual = Math.round(imponible * COTI.MUTUAL / 100);
  const costoEmpleador = worker.salary + cSIS + cCes + cMutual;

  return {
    periodo: periodo || today().slice(0,7),
    bruto: worker.salary,
    imponible,
    dAFP, dComAFP, comisionAFP, dSalud, saludPct: worker.saludPct||7, dCesantia,
    totalDesc, liquido,
    cSIS, cCes, cMutual, costoEmpleador,
    afp: worker.afp, salud: worker.salud, contract: worker.contract
  };
}

let CU = null;

const SESSION_MINS = 480; // 8 hours

function startSession(){
  clearInterval(sessionTimer);
  let remaining = SESSION_MINS * 60;
  sessionTimer = setInterval(()=>{
    remaining--;
    const mins = Math.floor(remaining/60);
    const el = document.getElementById('tb-session');
    if(el){
      if(remaining <= 300) el.innerHTML=`<span style="color:var(--yellow)">⏳ Sesión expira en ${mins}m</span>`;
      else el.textContent='';
    }
    if(remaining <= 0){ clearInterval(sessionTimer); logout(); }
  }, 1000);
}

function doSearch(q){
  const el=document.getElementById('search-results');
  if(!q||q.length<2){el.style.display='none';return;}
  const Q=q.toLowerCase();
  const results=[];
  DB.projects.forEach(p=>{if(p.name.toLowerCase().includes(Q)||p.code.toLowerCase().includes(Q)||p.client.toLowerCase().includes(Q)){results.push({ic:'🏗️',tag:'Proyecto',title:p.code+' — '+p.name,sub:p.client,goto:()=>navigate('proj')});}});
  DB.suppliers.forEach(s=>{if(s.name.toLowerCase().includes(Q)||s.rut.includes(Q)){results.push({ic:'🏭',tag:'Proveedor',title:s.name,sub:s.rut,goto:()=>navigate('purch')});}});
  DB.materials.forEach(m=>{if(m.name.toLowerCase().includes(Q)||m.code.toLowerCase().includes(Q)){results.push({ic:'📦',tag:'Material',title:m.code+' — '+m.name,sub:m.unit,goto:()=>navigate('wh')});}});
  DB.purchases.forEach(o=>{if(o.code.toLowerCase().includes(Q)){results.push({ic:'🛒',tag:'OC',title:o.code,sub:clp(o.total),goto:()=>navigate('purch')});}});
  DB.workers.forEach(w=>{if(w.name.toLowerCase().includes(Q)||w.rut.includes(Q)){results.push({ic:'👷',tag:'Trabajador',title:w.name,sub:w.rut,goto:()=>navigate('hr')});}});
  if(!results.length){el.innerHTML='<div style="padding:14px 16px;color:var(--muted);font-size:13px">Sin resultados para "'+esc(q)+'"</div>';el.style.display='block';return;}
  el.innerHTML=results.slice(0,8).map(r=>`<div class="sr-item" onclick="closeSearch();(${r.goto.toString()})()"><span style="font-size:18px">${r.ic}</span><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis">${esc(r.title)}</div><div style="font-size:11px;color:var(--muted)">${esc(r.sub||'')}</div></div><span class="sr-tag">${r.tag}</span></div>`).join('');
  el.style.display='block';
}

function setAPUPct(id,v){DB.budgetAPU=DB.budgetAPU.map(b=>b.id===id?{...b,pct:Math.max(0,Math.min(100,Number(v)))}:b);save('budgetAPU');renderAPUBody();}
function setAPUMarkup(id,v){DB.budgetAPU=DB.budgetAPU.map(b=>b.id===id?{...b,markup:Math.max(0,Number(v))}:b);save('budgetAPU');renderAPUBody();}
function delAPU(id){confirmDlg('Eliminar Partida APU','¿Eliminar esta partida del presupuesto?',()=>{DB.budgetAPU=DB.budgetAPU.filter(b=>b.id!==id);save('budgetAPU');toast('Partida eliminada','warn');renderAPUBody();});}

function toggleTplAll(ci){const chk=document.getElementById(`tpl-all-${ci}`);document.querySelectorAll(`.tpl-cb-${ci}`).forEach(el=>el.checked=chk.checked);}

function doImportAPU(pid){
  let count=0;
  document.querySelectorAll('.tpl-cb:checked').forEach(cb=>{
    const [ci,ii]=cb.value.split('-').map(Number);
    const ch=APU_TPL[ci];const it=ch.items[ii];
    DB.budgetAPU.push({id:uid(),pid,chapter:ch.chapter,code:it.code,desc:it.desc,unit:it.unit,qty:0,upMO:it.upMO,upMAT:it.upMAT,upSC:it.upSC,upEQ:it.upEQ,markup:MARKUP_DEFAULT,pct:0,active:true});
    count++;
  });
  save('budgetAPU');closeModal();
  if(count)toast(`${count} partidas importadas desde plantilla MINVU 2025`);
  else toast('Selecciona al menos una partida','warn');
  renderAPUBody();
}

      </div>
      ${isAdmin()?`<div class="grid-2">

  setTimeout(()=>calcAPUTotal(),50);
}

function calcAPUTotal(){
  const mo=Number(document.getElementById('apuf-mo')?.value||0);
  const mat=Number(document.getElementById('apuf-mat')?.value||0);
  const sc=Number(document.getElementById('apuf-sc')?.value||0);
  const eq=Number(document.getElementById('apuf-eq')?.value||0);
  const tot=mo+mat+sc+eq;
  const tEl=document.getElementById('apuf-total');
  if(tEl) tEl.value=clp(tot);
}

function saveAPU(id,pid){
  const g=x=>document.getElementById(x);
  const ch=g('apuf-ch')?.value?.trim();const desc=g('apuf-desc')?.value?.trim();
  if(!ch||!desc){toast('Completa capítulo y descripción','err');return;}
  const data={id:id||uid(),pid,chapter:ch,code:g('apuf-code')?.value||'',desc,unit:g('apuf-unit')?.value||'',qty:Number(g('apuf-qty')?.value)||0,upMO:Number(g('apuf-mo')?.value)||0,upMAT:Number(g('apuf-mat')?.value)||0,upSC:Number(g('apuf-sc')?.value)||0,upEQ:Number(g('apuf-eq')?.value)||0,markup:Number(g('apuf-mk')?.value)||MARKUP_DEFAULT,pct:Number(g('apuf-pct')?.value)||0,active:true};
  if(id)DB.budgetAPU=DB.budgetAPU.map(b=>b.id===id?data:b);else DB.budgetAPU.push(data);
  save('budgetAPU');closeModal();toast(id?'Partida actualizada':'Partida agregada');renderAPUBody();
}

// ── EXPORT EXCEL APU ──
function exportAPUXLSX(){
  if(typeof XLSX==='undefined'){toast('SheetJS no disponible','err');return;}
  const pid=getAPUPid();const type=apuBudType;
  const proj=DB.projects.find(p=>p.id===pid);
  const items=DB.budgetAPU.filter(b=>b.pid===pid&&b.active!==false);
  const co=DB.company;
  const wb=XLSX.utils.book_new();
  // APU Sheet
  const hdr=[['PRESUPUESTO '+(type==='CLIENT'?'CLIENTE':'CONSTRUCCIÓN')],
    [co.name,'','','RUT:',co.rut],
    ['Proyecto:',proj?.name||'','','Código:',proj?.code||''],
    ['Cliente:',proj?.client||'','','Fecha:',new Date().toLocaleDateString('es-CL')],
    [],
    ['Cód','Descripción','Un','Cantidad','U.MO','U.Material','U.Subcontrato','U.Equipo','U.Total',(type==='CLIENT'?'Margen%':'')].filter(Boolean).concat(type==='CLIENT'?['P.Cliente','Total']:['Total']).concat(['Avance%','Ejecutado'])];
  const chs=[...new Set(items.map(i=>i.chapter))];
  const rows=[...hdr];
  chs.forEach(ch=>{
    rows.push([ch,'','','','','','','','','',type==='CLIENT'?'':''].filter((_,i)=>type==='CLIENT'||i!==9));
    items.filter(i=>i.chapter===ch).forEach(b=>{
      const up=apuUP(b);const upC=apuUPClient(b);const tot=apuTotal(b,type);
      const row=[b.code,b.desc,b.unit,b.qty,b.upMO,b.upMAT,b.upSC,b.upEQ,up];
      if(type==='CLIENT') row.push(b.markup,upC);
      row.push(tot,b.pct,Math.round(tot*b.pct/100));
      rows.push(row);
    });
    const chT=items.filter(i=>i.chapter===ch).reduce((s,b)=>s+apuTotal(b,type),0);
    rows.push(['','Subtotal '+ch,'','','','','','','','',(type==='CLIENT'?'':''),chT,'',''].slice(0,type==='CLIENT'?14:12));
  });
  const total=items.reduce((s,b)=>s+apuTotal(b,type),0);
  rows.push([]);rows.push(['','TOTAL GENERAL','','','','','','','','','',total,'',''].slice(0,type==='CLIENT'?14:12));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:8},{wch:40},{wch:6},{wch:10},{wch:12},{wch:12},{wch:14},{wch:10},{wch:12},{wch:8},{wch:12},{wch:14},{wch:8},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,'Presupuesto APU');
  XLSX.writeFile(wb,`Presupuesto_${type}_${proj?.code||pid}_${today()}.xlsx`);
  toast('Excel exportado','ok');
}

function setCFView(v){cfView=v;pgCashFlow();}

const MONTHS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function getCFData(){
  const rows=cfView==='proj'?DB.cashFlow.filter(r=>r.pid===cfPid&&r.year===cfYear):DB.cashFlow.filter(r=>r.year===cfYear);
  // Aggregate by month
  const byMonth={};
  for(let m=1;m<=12;m++){
    const mrs=rows.filter(r=>r.month===m);
    byMonth[m]={incPlan:mrs.reduce((s,r)=>s+r.incPlan,0),incReal:mrs.reduce((s,r)=>s+r.incReal,0),expPlan:mrs.reduce((s,r)=>s+r.expPlan,0),expReal:mrs.reduce((s,r)=>s+r.expReal,0)};
  }
  return byMonth;
}

      <tr class="cf-income"><td class="label">Facturación planificada</td>${MONTHS.map((_,i)=>{const v=byM[i+1]?.incPlan||0;return `<td><input class="cf-editable" type="number" value="${v}" onchange="updateCF('inc','plan',${i+1},this.value)">${v?'':''}</td>`;}).join('')}<td style="font-weight:700;color:var(--green);background:#f0fdf4">${clp(totIncP)}</td></tr>
      <tr class="cf-income"><td class="label">Facturación real</td>${MONTHS.map((_,i)=>{const v=byM[i+1]?.incReal||0;return `<td style="color:${v>0?'var(--green)':'var(--muted)'}">${v?clp(v):'—'}</td>`;}).join('')}<td style="font-weight:700;color:var(--green);background:#f0fdf4">${clp(totIncR)}</td></tr>
      <tr class="section-head"><td class="label">📉 EGRESOS</td>${MONTHS.map(()=>'<td></td>').join('')}<td></td></tr>
      <tr class="cf-expense"><td class="label">Costos planificados</td>${MONTHS.map((_,i)=>{const v=byM[i+1]?.expPlan||0;return `<td><input class="cf-editable" type="number" value="${v}" onchange="updateCF('exp','plan',${i+1},this.value)"></td>`;}).join('')}<td style="font-weight:700;color:var(--red);background:#fef2f2">${clp(totExpP)}</td></tr>
      <tr class="cf-expense"><td class="label">Costos reales</td>${MONTHS.map((_,i)=>{const v=byM[i+1]?.expReal||0;return `<td style="color:${v>0?'var(--red)':'var(--muted)'}">${v?clp(v):'—'}</td>`;}).join('')}<td style="font-weight:700;color:var(--red);background:#fef2f2">${clp(totExpR)}</td></tr>
      <tr class="total-row"><td class="label">💰 Saldo Mensual Plan</td>${MONTHS.map((_,i)=>{const v=(byM[i+1]?.incPlan||0)-(byM[i+1]?.expPlan||0);return `<td style="color:${v>=0?'var(--green)':'var(--red)'}">${v?clp(v):'—'}</td>`;}).join('')}<td style="color:${totBalP>=0?'var(--green)':'var(--red)'}">${clp(totBalP)}</td></tr>
      <tr class="total-row"><td class="label">✅ Saldo Mensual Real</td>${MONTHS.map((_,i)=>{const v=(byM[i+1]?.incReal||0)-(byM[i+1]?.expReal||0);return `<td style="color:${v>0?'var(--green)':v<0?'var(--red)':'var(--muted)'}">${v?clp(v):'—'}</td>`;}).join('')}<td style="color:${totBalR>=0?'var(--green)':'var(--red)'}">${clp(totBalR)}</td></tr>
      <tr class="acum-row"><td class="label">📊 Acumulado Plan</td>${MONTHS.map((_,i)=>{acumP+=(byM[i+1]?.incPlan||0)-(byM[i+1]?.expPlan||0);return `<td style="font-weight:700">${acumP?clp(acumP):'—'}</td>`;}).join('')}<td style="font-weight:700">${clp(acumP)}</td></tr>

function updateCF(cat,plan,month,val){
  const pid=cfView==='proj'?cfPid:null;
  const v=Number(val)||0;
  const key=cat==='inc'?(plan==='plan'?'incPlan':'incReal'):(plan==='plan'?'expPlan':'expReal');
  if(cfView==='proj'){
    const ex=DB.cashFlow.find(r=>r.pid===cfPid&&r.year===cfYear&&r.month===month);
    if(ex) DB.cashFlow=DB.cashFlow.map(r=>r.pid===cfPid&&r.year===cfYear&&r.month===month?{...r,[key]:v}:r);
    else DB.cashFlow.push({id:uid(),pid:cfPid,year:cfYear,month,incPlan:0,incReal:0,expPlan:0,expReal:0,[key]:v});
  }
  save('cashFlow');
}

function saveCFRow(){
  const g=x=>Number(document.getElementById(x)?.value||0);
  const pid=document.getElementById('cff-pid')?.value;const yr=Number(document.getElementById('cff-yr')?.value);const mo=Number(document.getElementById('cff-mo')?.value);
  if(!pid||!yr||!mo){toast('Selecciona proyecto, año y mes','err');return;}
  const ex=DB.cashFlow.find(r=>r.pid===pid&&r.year===yr&&r.month===mo);
  if(ex) DB.cashFlow=DB.cashFlow.map(r=>r.pid===pid&&r.year===yr&&r.month===mo?{...r,incPlan:g('cff-ip'),incReal:g('cff-ir'),expPlan:g('cff-ep'),expReal:g('cff-er')}:r);
  else DB.cashFlow.push({id:uid(),pid,year:yr,month:mo,incPlan:g('cff-ip'),incReal:g('cff-ir'),expPlan:g('cff-ep'),expReal:g('cff-er')});

}

function exportCFXLSX(){
  if(typeof XLSX==='undefined'){toast('SheetJS no disponible','err');return;}
  const byM=getCFData();

  const rows=[
    ['FLUJO DE CAJA '+(cfView==='summary'?'RESUMEN EMPRESA':`PROYECTO: ${proj?.code||''} — ${proj?.name||''}`)],
    ['Año:',cfYear,'','','Empresa:',DB.company.name],
    [],
    ['Concepto',...MONTHS,'TOTAL'],
    ['INGRESOS PLANIFICADOS',...MONTHS.map((_,i)=>byM[i+1]?.incPlan||0),Object.values(byM).reduce((s,m)=>s+m.incPlan,0)],
    ['INGRESOS REALES',...MONTHS.map((_,i)=>byM[i+1]?.incReal||0),Object.values(byM).reduce((s,m)=>s+m.incReal,0)],
    ['EGRESOS PLANIFICADOS',...MONTHS.map((_,i)=>byM[i+1]?.expPlan||0),Object.values(byM).reduce((s,m)=>s+m.expPlan,0)],
    ['EGRESOS REALES',...MONTHS.map((_,i)=>byM[i+1]?.expReal||0),Object.values(byM).reduce((s,m)=>s+m.expReal,0)],
    ['SALDO PLAN',...MONTHS.map((_,i)=>(byM[i+1]?.incPlan||0)-(byM[i+1]?.expPlan||0)),Object.values(byM).reduce((s,m)=>s+(m.incPlan-m.expPlan),0)],
    ['SALDO REAL',...MONTHS.map((_,i)=>(byM[i+1]?.incReal||0)-(byM[i+1]?.expReal||0)),Object.values(byM).reduce((s,m)=>s+(m.incReal-m.expReal),0)],
  ];
  let a=0;rows.push(['ACUMULADO PLAN',...MONTHS.map((_,i)=>{a+=(byM[i+1]?.incPlan||0)-(byM[i+1]?.expPlan||0);return a;}),a]);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:28},...Array(13).fill({wch:14})];

  XLSX.writeFile(wb,`FlujoCaja_${cfYear}_${today()}.xlsx`);
  toast('Excel exportado','ok');
}

function getGGPid(){return document.getElementById('gg-pid')?.value||'';}

function renderGGBody(){
  const pid=getGGPid();
  const items=pid?DB.generalExpenses.filter(g=>g.pid===pid):DB.generalExpenses;
  const cats=[...new Set(items.map(g=>g.type))];
  const total=items.reduce((s,g)=>s+g.amount,0);
  const paid=items.filter(g=>g.paid).reduce((s,g)=>s+g.amount,0);
  const unpaid=items.filter(g=>!g.paid).reduce((s,g)=>s+g.amount,0);

  const kEl=document.getElementById('gg-kpis');
  if(kEl) kEl.innerHTML=kpiHTML('🏢','Total GG',clp(total),items.length+' gastos','blue')+kpiHTML('✅','Pagados',clp(paid),items.filter(g=>g.paid).length+' gastos','green')+kpiHTML('⏳','Pendientes',clp(unpaid),items.filter(g=>!g.paid).length+' gastos',unpaid?'red':'')+kpiHTML('📊','% s/Presupuesto',`${DB.budgetAPU.length?Math.round(total/Math.max(1,DB.budgetAPU.filter(b=>!pid||b.pid===pid).reduce((s,b)=>s+apuTotal(b,'CONSTR'),0))*100):0}%`,'del costo directo','orange');

  const bEl=document.getElementById('gg-body');if(!bEl)return;
  if(!items.length){bEl.innerHTML=`<div class="card"><div class="card-body" style="text-align:center;padding:50px;color:var(--muted)"><div style="font-size:48px">🏢</div><div style="font-weight:700;margin-top:12px">Sin gastos generales</div></div></div>`;return;}

  // Summary by category
  const catSummary=cats.map(cat=>{const ci=items.filter(g=>g.type===cat);return{cat,total:ci.reduce((s,g)=>s+g.amount,0),count:ci.length};}).sort((a,b)=>b.total-a.total);

  bEl.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px">
    <div class="card"><div class="card-head"><div class="card-title">Por Categoría</div></div><div class="card-body">
      ${catSummary.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

  ocIC=0;

  openModal(`${mH('Nueva Orden de Compra')}${mB(`
    <div class="grid-2">

      <button class="btn btn-ghost btn-sm" onclick="addOCI()">+ Ítem</button>
    </div>
    <div id="oc-items"></div>
    <div id="oc-ttl" style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;font-weight:700;color:var(--navy);text-align:right">Total: ${clp(0)}</div>
  `)}${mF(`<button class="btn btn-ghost btn-md" onclick="closeModal()">Cancelar</button><button class="btn btn-primary btn-md" onclick="saveOC()">💾 Crear OC</button>`)}`, 'm-lg');
  addOCI();

function addOCI(){
  ocIC++;const n=ocIC;const el=document.getElementById('oc-items');if(!el)return;
  const d=document.createElement('div');d.id='oci-'+n;d.style.cssText='display:grid;grid-template-columns:3fr 1fr 1.5fr 1.5fr auto;gap:8px;margin-bottom:8px;align-items:end';
  d.innerHTML=`
    <div class="field"><label>Material</label><select id="oci-mid-${n}" onchange="calcOCI(${n})">${selOpts(DB.materials.map(m=>({v:m.id,l:`${m.code} — ${m.name}`})))}</select></div>
    <div class="field"><label>Cant.</label><input type="number" id="oci-qty-${n}" value="1" min="0" oninput="calcOCI(${n})"></div>
    <div class="field"><label>P.Unit</label><input type="number" id="oci-up-${n}" value="0" min="0" oninput="calcOCI(${n})"></div>
    <div class="field"><label>Total</label><input type="text" id="oci-t-${n}" value="$0" readonly></div>
    <button class="btn btn-danger btn-sm" onclick="document.getElementById('oci-${n}').remove();calcOCTotal()" style="margin-top:20px">✕</button>`;
  el.appendChild(d);
}
function calcOCI(n){
  const qty=Number(document.getElementById(`oci-qty-${n}`)?.value||0);
  const up=Number(document.getElementById(`oci-up-${n}`)?.value||0);
  const t=qty*up;const tel=document.getElementById(`oci-t-${n}`);
  if(tel)tel.value=clp(t);calcOCTotal();
}
function calcOCTotal(){
  let total=0;
  document.querySelectorAll('[id^="oci-t-"]').forEach(el=>{total+=Number(el.value.replace(/[^0-9]/g,''))||0;});
  const el=document.getElementById('oc-ttl');if(el)el.textContent='Total OC: '+clp(total);
}
function saveOC(){
  const pid=document.getElementById('oc-pid')?.value;const sid=document.getElementById('oc-sid')?.value;
  if(!pid||!sid){toast('Selecciona proyecto y proveedor','err');return;}
  const items=[];let total=0;
  document.querySelectorAll('[id^="oci-mid-"]').forEach(el=>{
    const n=el.id.split('-')[2];const mid=el.value;
    const qty=Number(document.getElementById(`oci-qty-${n}`)?.value||0);const up=Number(document.getElementById(`oci-up-${n}`)?.value||0);const t=qty*up;
    if(mid&&qty>0){items.push({mid,qty,up,t});total+=t;}
  });
  if(!items.length){toast('Agrega al menos un ítem','err');return;}
  DB.purchases.push({id:uid(),code:`OC-${String(DB.purchases.length+1).padStart(3,'0')}`,pid,sid,status:'PENDIENTE',items,total,notes:document.getElementById('oc-notes')?.value||'',by:CU.id,date:today(),approvedBy:null,adate:null,rdate:null});
  save('purchases');closeModal();toast('OC creada — pendiente de aprobación','info');filterOC('TODOS');updateNotif();
}

function renderDTEItems(){
  const el=document.getElementById('dte-items');if(!el)return;
  el.innerHTML=dteItems.map((it,i)=>`<div style="display:grid;grid-template-columns:3fr 1fr 1.5fr 1.5fr ${dteItems.length>1?'auto':''};gap:8px;margin-bottom:8px;align-items:end">

function updateDTEI(i,k,v){dteItems[i]={...dteItems[i],[k]:v};if(k==='qty'||k==='up')dteItems[i].t=Number(dteItems[i].qty||0)*Number(dteItems[i].up||0);renderDTEItems();}
function removeDTEI(i){dteItems=dteItems.filter((_,j)=>j!==i);renderDTEItems();}

function emitDTE(){
  const rrut=document.getElementById('dte-rrut')?.value?.trim();
  const rname=document.getElementById('dte-rname')?.value?.trim();
  if(!rrut||!rname){toast('Completa RUT y Razón Social del receptor','err');return;}
  const net=dteItems.reduce((s,x)=>s+x.t,0);
  const iva=Math.round(net*.19);
  closeModal();
  // Simulate API call with steps
  let step=0;
  const folio=String(DB.invoices.length+1).padStart(6,'0');
  const track='TRK-'+Math.random().toString(36).slice(2,9).toUpperCase();
  const hasKey=DB.company.siiApiKey&&DB.company.siiApiKey.length>4;

  const steps=[
    {ic:'🔐',title:'Autenticando credenciales',txt:'Verificando API Key ChileSystems...'},
    {ic:'📝',title:'Generando XML DTE',txt:'Construyendo documento según esquema SII...'},
    {ic:'✍️',title:'Firmando digitalmente',txt:'Aplicando certificado digital del emisor...'},
    {ic:'📤',title:'Enviando al SII',txt:'POST https://api.chilesystems.com/v2/dte/emitir'},
    {ic:'✅',title:'¡DTE Emitido Exitosamente!',txt:'',success:true},
  ];

  function showStep(){
    const s=steps[step];
    openModal(`${mH('Procesando DTE')}${mB(`<div style="text-align:center;padding:16px">
      <div style="font-size:52px;margin-bottom:12px;${!s.success?'animation:spin 1.2s linear infinite;display:inline-block':''}">${s.ic}</div>
      <div style="font-weight:700;font-size:18px;margin-bottom:8px;${s.success?'color:var(--green)':''}">${s.title}</div>
      ${s.txt&&!s.success?`<div style="font-size:13px;color:var(--muted);margin-bottom:16px;font-family:monospace;background:#f8fafc;padding:8px;border-radius:6px">${esc(s.txt)}</div>`:''}
      ${!s.success?`<div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;max-width:300px;margin:0 auto"><div style="height:100%;background:var(--navy);width:${(step+1)/steps.length*100}%;border-radius:3px;transition:width .8s"></div></div>`:''}
      ${s.success?`<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;text-align:left;font-size:12px;margin-bottom:16px">
        <div style="margin-bottom:4px">✅ XML generado y firmado con certificado digital</div>
        <div style="margin-bottom:4px">✅ Validado y aceptado por el SII</div>
        <div style="margin-bottom:4px">✅ Folio <strong>F-${folio}</strong> asignado automáticamente</div>
        <div style="margin-bottom:4px">✅ PDF generado y enviado por email a ${esc(rname)}</div>
        ${!hasKey?`<div style="color:var(--yellow);margin-top:8px">⚠️ Modo demo: configura API Key real en Configuración → Empresa</div>`:''}
        <div style="font-weight:700;color:var(--green);margin-top:8px;font-family:monospace">Track ID: ${track}</div>
      </div>`:''}
    </div>`)}${s.success?mF(`<button class="btn btn-primary btn-md" onclick="closeModal()">🎉 Excelente</button>`):''}`, 'm-sm');

    if(!s.success){step++;setTimeout(showStep,1400);}
    else{
      DB.invoices.push({id:uid(),code:`F-${folio}`,type:Number(document.getElementById('dte-type')?.value||33)||33,pid:document.getElementById('dte-pid')?.value||'',recipRut:rrut,recipName:rname,net,iva,total:net+iva,status:'ACEPTADO',folio,track,date:today(),items:dteItems});
      save('invoices');
    }
  }
  showStep();
}

function saveAddTxn(){
  const g=x=>document.getElementById(x);
  const amount=Number(g('nt-amount')?.value||0);const type=g('nt-type')?.value;
  if(!amount||!g('nt-desc')?.value){toast('Completa monto y descripción','err');return;}
  const finalAmount=type==='credit'?amount:-amount;
  const bid=g('nt-bid')?.value||selBank;
  DB.bankTxns.push({id:uid(),bid,date:g('nt-date')?.value||today(),desc:g('nt-desc').value,amount:finalAmount,type,ref:g('nt-ref')?.value||'',matched:null});
  DB.bankAccounts=DB.bankAccounts.map(b=>b.id===bid?{...b,balance:b.balance+finalAmount}:b);
  save('bankTxns');save('bankAccounts');closeModal();toast('Movimiento registrado');renderBankBody();
}
function delTxn(id){
  confirmDlg('Eliminar Movimiento','¿Eliminar este movimiento bancario?',()=>{
    const t=DB.bankTxns.find(x=>x.id===id);if(t)DB.bankAccounts=DB.bankAccounts.map(b=>b.id===t.bid?{...b,balance:b.balance-t.amount}:b);
    DB.bankTxns=DB.bankTxns.filter(x=>x.id!==id);save('bankTxns');save('bankAccounts');toast('Movimiento eliminado','warn');renderBankBody();
  });
}
function openMatchForm(txnId){
  const txn=DB.bankTxns.find(x=>x.id===txnId);if(!txn)return;
  const allDocs=[
    ...DB.invoices.map(i=>({id:i.id,label:`Factura ${i.code} — ${i.recipName} — ${clp(i.total)}`,type:'invoice'})),
    ...DB.purchases.map(p=>({id:p.id,label:`OC ${p.code} — ${clp(p.total)}`,type:'oc'})),
    ...DB.subcontracts.flatMap(s=>(s.eps||[]).filter(e=>!e.paid).map((e,i)=>({id:s.id+'_ep_'+i,label:`${s.desc} — ${e.code} — ${clp(e.amount)}`,type:'ep'}))),
  ];

    <div class="alert a-warn">Solo vincula documentos con montos similares para mantener la integridad contable.</div>
  `)}${mF(`<button class="btn btn-ghost btn-md" onclick="closeModal()">Cancelar</button><button class="btn btn-success btn-md" onclick="saveMatch('${txnId}')">🔗 Conciliar</button>`)}`, 'm-md');

function saveMatch(txnId){
  const docId=document.getElementById('match-doc')?.value;
  if(!docId){toast('Selecciona un documento','err');return;}
  DB.bankTxns=DB.bankTxns.map(t=>t.id===txnId?{...t,matched:docId}:t);
  save('bankTxns');closeModal();toast('Movimiento conciliado','ok');renderBankBody();
}
function exportBankCSV(){
  const ba=DB.bankAccounts.find(x=>x.id===selBank);
  const txns=DB.bankTxns.filter(t=>t.bid===selBank).sort((a,b)=>b.date.localeCompare(a.date));
  let csv=`Fecha,Descripción,Referencia,Monto,Tipo,Conciliado\n`;
  txns.forEach(t=>{csv+=`${t.date},"${t.desc}","${t.ref||''}",${t.amount},${t.type},${t.matched?'Sí':'No'}\n`;});
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`conciliacion_${ba?.name?.replace(/\s/g,'_')}_${today()}.csv`;a.click();URL.revokeObjectURL(url);
  toast('CSV exportado','ok');
}

    <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:20px">
      <div style="font-weight:700;color:var(--red);margin-bottom:6px">⚠️ Zona de Peligro</div>

function testSIIConn(){
  const key=document.getElementById('cf-siikey')?.value?.trim();
  if(!key){toast('Ingresa una API Key para probar','warn');return;}
  toast('Probando conexión con ChileSystems...','info',2000);
  setTimeout(()=>{
    // In production: fetch('https://api.chilesystems.com/v2/ping', {headers:{'X-API-Key':key}})
    if(key.length>10) toast('Conexión exitosa con ChileSystems SimpleAPI ✅','ok');
    else toast('API Key inválida — verifica en chilesystems.com','err');
  },1800);
}

function saveCfgCo(){
  const g=x=>document.getElementById(x);
  DB.company={...DB.company,name:g('cf-name')?.value||DB.company.name,rut:g('cf-rut')?.value||DB.company.rut,giro:g('cf-giro')?.value||DB.company.giro,phone:g('cf-phone')?.value||DB.company.phone,email:g('cf-email')?.value||DB.company.email,address:g('cf-addr')?.value||DB.company.address,siiRut:g('cf-siirut')?.value||DB.company.siiRut,siiEnv:g('cf-siienv')?.value||DB.company.siiEnv,siiApiKey:g('cf-siikey')?.value||DB.company.siiApiKey};
  save('company');document.getElementById('sb-co').textContent=DB.company.name;toast('Configuración guardada');
}

function openUserForm(id=''){
  const u=id?DB.users.find(x=>x.id===id):{role:'JEFE',active:true};
  openModal(`${mH(id?'Editar Usuario':'Nuevo Usuario')}${mB(`
    ${fld('Nombre completo','uf-name','text',u.name||'','',true)}
    ${fld('Email','uf-email','email',u.email||'','',true)}
    ${fld('Contraseña','uf-pass','password','',id?'placeholder="Dejar vacío para no cambiar"':'','',false,'Mínimo 8 caracteres. Usa mayúsculas, números y símbolos.')}
    ${fld('Rol','uf-role','select',selOpts([{v:'ADMIN',l:'Administrador (acceso total)'},{v:'JEFE',l:'Jefe de Terreno (acceso parcial)'}],u.role))}
    ${fld('Teléfono','uf-phone','text',u.phone||'','placeholder="+56912345678"')}
  `)}${mF(`<button class="btn btn-ghost btn-md" onclick="closeModal()">Cancelar</button><button class="btn btn-primary btn-md" onclick="saveUser('${id}')">💾 Guardar</button>`)}`, 'm-md');
}
function saveUser(id){
  const g=x=>document.getElementById(x);
  const nm=g('uf-name')?.value?.trim();const email=g('uf-email')?.value?.trim().toLowerCase();
  if(!nm||!email){toast('Completa nombre y email','err');return;}
  if(!id&&!g('uf-pass')?.value){toast('Ingresa una contraseña inicial','err');return;}
  if(g('uf-pass')?.value&&g('uf-pass').value.length<6){toast('La contraseña debe tener al menos 6 caracteres','err');return;}
  const existing=DB.users.find(u=>u.email.toLowerCase()===email&&u.id!==id);
  if(existing){toast('Ya existe un usuario con ese email','err');return;}
  const data={id:id||uid(),name:nm,email,pass:g('uf-pass')?.value||(id?DB.users.find(u=>u.id===id)?.pass:''),role:g('uf-role')?.value||'JEFE',phone:g('uf-phone')?.value||'',active:true};
  if(id)DB.users=DB.users.map(u=>u.id===id?{...data,active:u.active}:u);else DB.users.push(data);
  save('users');closeModal();toast('Usuario guardado');renderCfgBody();
}
function toggleUser(id){DB.users=DB.users.map(u=>u.id===id?{...u,active:!u.active}:u);save('users');renderCfgBody();}

loadDB();
// Restore session
try{
  const sess=localStorage.getItem('erp4_sess');
  if(sess){
    const s=JSON.parse(sess);
    // Expire after 8h
    if(Date.now()-s.ts < SESSION_MINS*60*1000){
      const u=DB.users.find(x=>x.id===s.id&&x.active);
      if(u){CU=u;showApp();}else showLogin();
    } else{localStorage.removeItem('erp4_sess');showLogin();}
  } else showLogin();
}catch(e){showLogin();}
</script>
